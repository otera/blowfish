{{ with .Params.shareButton | default (.Site.Params.article.shareButton | default true) }}
  <style>
    .share-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      border-radius: 5px;
      text-decoration: none;
      color: white;
      transition: filter 0.2s;
    }
    .share-btn:hover {
      filter: brightness(0.85);
    }
    .share-btn-ofuse {
      width: 145px;
      background-color: #ec9097;
    }
    .share-btn-anypost {
      width: 90px;
      background: #2d3748;
      border: 1px solid #4a5568;
    }
  </style>
  <div style="display: flex; gap: 8px; align-items: center">
    <a
      href="https://ofuse.me/ryouu"
      target="_blank"
      rel="noopener"
      class="share-btn share-btn-ofuse"
    >
      <div style="margin-right: 6px">{{ partial "icon.html" "heart" }}</div>OFUSEで応援
    </a>
    <a
      href="https://b.hatena.ne.jp/entry/"
      class="hatena-bookmark-button"
      data-hatena-bookmark-layout="touch"
      title="このエントリーをはてなブックマークに追加"
      ><img
        src="https://b.st-hatena.com/images/v4/public/entry-button/button-only@2x.png"
        alt="このエントリーをはてなブックマークに追加"
        width="20"
        height="20"
        style="border: none;"
    /></a>
    <script
      type="text/javascript"
      src="https://b.st-hatena.com/js/bookmark_button.js"
      charset="utf-8"
      async="async"
    ></script>
    <a
      href="https://anypost.dev/share"
      onclick="
        window.open(
          this.href + '?s=' + location.href + '&t=' + document.title,
          '',
          'width=500,height=750',
        );
        return false;
      "
      rel="noopener"
      class="share-btn share-btn-anypost"
    >
      <svg
        width="16"
        height="16"
        style="margin-right: 6px"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
        ></path>
      </svg>Share
    </a>
  </div>
{{ end }}
